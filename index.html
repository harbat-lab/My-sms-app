<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya SMS Inbox - Live</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: #00A859;
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255,255,255,0.2);
        }
        .status.active { background: #fff; color: #00A859; }
        .container {
            background: white;
            border-radius: 0 0 12px 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .number-box {
            background: #f0f9f4;
            border: 2px dashed #00A859;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .number-box h2 {
            color: #00A859;
            font-size: 28px;
            margin: 10px 0;
        }
        button {
            background: #00A859;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #008a47; }
        .inbox { margin-top: 20px; }
        .inbox h3 { margin-bottom: 12px; color: #333; }
        .msg {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #00A859;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-from { font-weight: 600; color: #00A859; font-size: 14px; }
        .msg-body { margin: 6px 0; color: #333; }
        .msg-time { font-size: 12px; color: #999; }
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Kenya SMS Inbox</h1>
        <span class="status" id="status">Waiting for number...</span>
    </div>
    <div class="container">
        <div id="numberSection">
            <button onclick="getNumber()" id="getBtn">Get +254 Number</button>
        </div>
        
        <div class="inbox">
            <h3>Inbox</h3>
            <div id="messages"></div>
            <div class="empty" id="empty">No messages yet. Text your +254 number to test!</div>
        </div>
        
        <div class="footer">
            Powered by Africa's Talking | Real +254 numbers
        </div>
    </div>

    <script>
        // ================== UPDATE THIS 1 VALUE ==================
        const API_URL = 'https://your-render-url.onrender.com'; // 1. Your Render backend URL
        // =========================================================
        
        let currentNumber = null;
        let socket = null;
        let messages = [];

        async function getNumber() {
            document.getElementById('getBtn').disabled = true;
            document.getElementById('getBtn').textContent = 'Loading...';
            
            try {
                const res = await fetch(`${API_URL}/get-number`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: 'demo_user'})
                });
                const data = await res.json();
                currentNumber = data.phone_number;
                
                document.getElementById('numberSection').innerHTML = `
                    <div class="number-box">
                        <p>Your active number:</p>
                        <h2>${currentNumber}</h2>
                        <p style="font-size:14px; color:#666;">Send SMS to this number to test</p>
                    </div>
                `;
                document.getElementById('status').textContent = 'Active';
                document.getElementById('status').classList.add('active');
                
                connectWebSocket();
                loadMessages();
            } catch (e) {
                alert('Error: ' + e.message);
                document.getElementById('getBtn').disabled = false;
                document.getElementById('getBtn').textContent = 'Get +254 Number';
            }
        }

        function connectWebSocket() {
            socket = io(API_URL);
            socket.on('connect', () => console.log('Connected to server'));
            socket.on('new_sms', (msg) => {
                if (msg.to === currentNumber) {
                    messages.unshift(msg);
                    renderMessages();
                }
            });
        }

        async function loadMessages() {
            try {
                const res = await fetch(`${API_URL}/messages?to=${currentNumber}`);
                const data = await res.json();
                messages = data.messages.reverse(); // newest first
                renderMessages();
            } catch (e) {
                console.error('Failed to load messages:', e);
            }
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            const empty = document.getElementById('empty');
            
            if (messages.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            
            empty.style.display = 'none';
            container.innerHTML = messages.map(msg => `
                <div class="msg">
                    <div class="msg-from">From: ${msg.from}</div>
                    <div class="msg-body">${msg.body}</div>
                    <div class="msg-time">${msg.timestamp}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
